<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveThree — Visor Marino</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0e1a; font-family: system-ui, sans-serif; }
    canvas { display: block; }

    #ui-overlay {
      position: fixed; top: 16px; left: 16px;
      background: rgba(10, 14, 26, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px;
      color: #e0e8f0;
      min-width: 240px;
      font-size: 14px;
    }
    #ui-overlay h1 {
      font-size: 18px; font-weight: 600; margin-bottom: 4px;
      background: linear-gradient(135deg, #60a5fa, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #ui-overlay .sub { color: #8899b0; font-size: 12px; margin-bottom: 16px; }
    #ui-overlay label { display: block; margin-top: 10px; font-size: 12px; color: #8899b0; }
    #ui-overlay input[type="range"] { width: 100%; margin-top: 4px; accent-color: #38bdf8; }
    #ui-overlay .value { float: right; color: #60a5fa; font-weight: 500; }

    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #0a0e1a;
      color: #60a5fa;
      font-size: 20px;
      z-index: 100;
      transition: opacity 0.8s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="loading">🌊 Cargando WaveThree…</div>

  <div id="ui-overlay">
    <h1>WaveThree</h1>
    <div class="sub">visor marino — three.js + webgpu</div>
    <label>
      Altura ola (Hs)
      <span class="value" id="hs-value">3.2 m</span>
    </label>
    <input type="range" id="hs-slider" min="0" max="10" step="0.1" value="3.2" />

    <label>
      Periodo (Tp)
      <span class="value" id="tp-value">8.7 s</span>
    </label>
    <input type="range" id="tp-slider" min="1" max="20" step="0.1" value="8.7" />

    <label>
      Dirección
      <span class="value" id="dir-value">245°</span>
    </label>
    <input type="range" id="dir-slider" min="0" max="360" step="1" value="245" />
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
