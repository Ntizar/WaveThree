<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaveThree — Visor Marino</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0e1a; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    canvas { display: block; }

    /* ── Glassmorphism UI ── */
    #ui-overlay {
      position: fixed; top: 20px; left: 20px;
      background: rgba(8, 16, 36, 0.65);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid rgba(100, 160, 230, 0.15);
      border-radius: 16px;
      padding: 24px;
      color: #d0e0f0;
      min-width: 280px;
      font-size: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.05);
      z-index: 10;
    }
    #ui-overlay h1 {
      font-size: 22px; font-weight: 700; margin-bottom: 2px;
      background: linear-gradient(135deg, #60a5fa, #38bdf8, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    #ui-overlay .sub { color: #6888a8; font-size: 11px; margin-bottom: 18px; text-transform: uppercase; letter-spacing: 1px; }

    /* ── Controls ── */
    .control-group { margin-top: 14px; }
    .control-group label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: #7898b8; margin-bottom: 4px;
    }
    .control-group label .val { color: #60a5fa; font-weight: 600; font-size: 13px; }
    .control-group input[type="range"] {
      width: 100%; margin-top: 2px; accent-color: #38bdf8;
      height: 4px; -webkit-appearance: none; appearance: none;
      background: rgba(56, 189, 248, 0.15); border-radius: 2px; outline: none;
    }
    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      background: #38bdf8; border-radius: 50%; cursor: pointer;
      box-shadow: 0 0 6px rgba(56, 189, 248, 0.5);
    }

    /* ── Divider ── */
    .divider {
      height: 1px; margin: 18px 0;
      background: linear-gradient(90deg, transparent, rgba(100, 160, 230, 0.2), transparent);
    }

    /* ── Select ── */
    .select-group { margin-top: 14px; }
    .select-group label {
      display: block; font-size: 12px; color: #7898b8; margin-bottom: 6px;
    }
    .select-group select {
      width: 100%; padding: 8px 12px;
      background: rgba(10, 20, 40, 0.7);
      border: 1px solid rgba(100, 160, 230, 0.2);
      border-radius: 8px; color: #c0d8f0; font-size: 13px;
      outline: none; cursor: pointer;
      transition: border-color 0.2s;
    }
    .select-group select:hover { border-color: rgba(100, 160, 230, 0.4); }
    .select-group select:focus { border-color: #38bdf8; }
    .select-group select option { background: #0a1428; color: #c0d8f0; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 8px; margin-top: 14px; }
    .btn {
      flex: 1; padding: 8px 12px;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: 8px; color: #60a5fa; font-size: 12px;
      cursor: pointer; text-align: center;
      transition: all 0.2s; font-weight: 500;
    }
    .btn:hover {
      background: rgba(56, 189, 248, 0.2);
      border-color: rgba(56, 189, 248, 0.5);
      color: #93d0ff;
    }
    .btn:active { transform: scale(0.97); }

    /* ── FPS indicator ── */
    #fps-indicator {
      position: fixed; top: 20px; right: 20px;
      background: rgba(8, 16, 36, 0.65);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid rgba(100, 160, 230, 0.15);
      border-radius: 10px;
      padding: 10px 16px;
      color: #60a5fa; font-size: 13px; font-weight: 600;
      font-variant-numeric: tabular-nums;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      z-index: 10;
    }
    #fps-indicator .fps-label { color: #5878a0; font-weight: 400; font-size: 11px; }
    #fps-indicator .fps-value { color: #38bdf8; }

    /* ── Loading screen ── */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #060c18, #0a1628);
      color: #60a5fa; font-size: 22px;
      z-index: 100; transition: opacity 0.8s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .spinner {
      width: 40px; height: 40px; margin-bottom: 16px;
      border: 3px solid rgba(56, 189, 248, 0.15);
      border-top-color: #38bdf8; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status bar ── */
    #status-bar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(8, 16, 36, 0.55);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(100, 160, 230, 0.12);
      border-radius: 10px;
      padding: 8px 20px;
      color: #6888a8; font-size: 12px;
      z-index: 10;
      transition: opacity 0.4s;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    🌊 Cargando WaveThree…
  </div>

  <div id="ui-overlay">
    <h1>WaveThree</h1>
    <div class="sub">visor marino — three.js</div>

    <div class="select-group">
      <label>🌊 Escenario</label>
      <select id="scenario-select">
        <option value="temporal">Temporal enero 2026</option>
        <option value="marfondo">Mar de fondo</option>
        <option value="calma">Calma</option>
      </select>
    </div>

    <div class="divider"></div>

    <div class="control-group">
      <label>Altura ola (Hs) <span class="val" id="hs-value">3.2 m</span></label>
      <input type="range" id="hs-slider" min="0" max="10" step="0.1" value="3.2" />
    </div>

    <div class="control-group">
      <label>Periodo (Tp) <span class="val" id="tp-value">8.7 s</span></label>
      <input type="range" id="tp-slider" min="1" max="20" step="0.1" value="8.7" />
    </div>

    <div class="control-group">
      <label>Dirección <span class="val" id="dir-value">245°</span></label>
      <input type="range" id="dir-slider" min="0" max="360" step="1" value="245" />
    </div>

    <div class="btn-row">
      <div class="btn" id="btn-reset">⟲ Reset cámara</div>
    </div>
  </div>

  <div id="fps-indicator">
    <span class="fps-label">FPS </span>
    <span class="fps-value" id="fps-value">--</span>
  </div>

  <div id="status-bar">Arrastra para orbitar · Scroll para zoom</div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
