name: Deploy WaveThree to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web-viewer/**'
      - 'src/**'
      - 'public/**'
      - 'package.json'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd apps/web-viewer
          npm install

      - name: Build
        run: |
          cd apps/web-viewer
          npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web-viewer/dist
          force_orphan: true
          user_name: 'David Antizar'
          user_email: 'david@antizar.es'